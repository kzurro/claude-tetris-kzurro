<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="theme-switch">
      <span class="theme-switch-icon">🌙</span>
      <label class="switch">
        <input type="checkbox" id="theme-toggle" aria-label="Cambiar a modo claro" />
        <span class="slider"></span>
      </label>
      <span class="theme-switch-icon">☀️</span>
    </div>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">ENERGÍA</span>
          <div class="energy-bar-track">
            <div id="energy-bar-fill" class="energy-bar-fill"></div>
          </div>
        </div>

        <div class="panel-section vision-panel hidden" id="vision-panel">
          <span class="label">VISIÓN <span id="vision-timer"></span></span>
          <canvas id="vision-canvas" width="120" height="400"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div class="stats-row">
          <span>Líneas máximas: <b id="overlay-max-lines">0</b></span>
          <span>Mejor combo: <b id="overlay-best-combo">0</b></span>
        </div>

        <div id="name-entry" class="name-entry hidden">
          <label for="player-name-input">¡Nuevo récord! Introduce tu nombre:</label>
          <input type="text" id="player-name-input" maxlength="10" autocomplete="off" />
          <button id="save-score-btn">Guardar</button>
        </div>

        <div class="hs-table-wrap">
          <table class="hs-table">
            <thead>
              <tr><th>#</th><th>Nombre</th><th>Puntos</th></tr>
            </thead>
            <tbody id="overlay-scores-body"></tbody>
          </table>
        </div>

        <button id="restart-btn">Reiniciar</button>
        <button id="overlay-reset-scores-btn" class="reset-scores-btn">Reiniciar récords</button>
      </div>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p class="screen-title">RÉCORDS</p>

        <div class="stats-row">
          <span>Líneas máximas: <b id="start-max-lines">0</b></span>
          <span>Mejor combo: <b id="start-best-combo">0</b></span>
        </div>

        <div class="hs-table-wrap">
          <table class="hs-table">
            <thead>
              <tr><th>#</th><th>Nombre</th><th>Puntos</th></tr>
            </thead>
            <tbody id="start-scores-body"></tbody>
          </table>
        </div>

        <button id="start-play-btn">Jugar</button>
        <button id="reset-scores-btn" class="reset-scores-btn">Reiniciar récords</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
